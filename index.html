<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ویترین گالری سما زرین</title>
    <style>
        /* 🎨 ۱. تغییر رنگ بک‌گراند به خیلی روشن + وکتورهای طلایی */
        body {
            background-color: #faf8f5; /* رنگ کرم-سفید بسیار روشن */
            /* اضافه کردن وکتورهای طلا/اسلیمی به صورت بک‌گراند تکرارشونده و محو */
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" viewBox="0 0 60 60"><path d="M30 5 C35 15, 45 15, 45 25 C45 35, 35 35, 30 45 C25 35, 15 35, 15 25 C15 15, 25 15, 30 5 Z" fill="none" stroke="%23d4af37" stroke-width="0.7" opacity="0.15"/></svg>');
            font-family: Tahoma, sans-serif;
            margin: 0;
            padding: 15px;
            color: #333;
        }

        /* 🤍 ۲. سفید کردن کامل جاهای نوشتنی (باکس‌ها و اینپوت‌ها) */
        .input-box, .search-container input, .info-card {
            background-color: #ffffff !important; /* سفید خالص */
            border: 1px solid #e5d5c5;
            border-radius: 12px;
            padding: 12px;
            box-shadow: 0 4px 12px rgba(212, 175, 55, 0.06); /* سایه بسیار ملایم طلایی */
            color: #222;
        }

        /* 📦 ۳. ساختار ردیف اسلایدی (پوشه‌بندی محصولات) */
        .category-section {
            margin-bottom: 30px;
        }

        .category-title {
            font-size: 1.1rem;
            color: #b8860b;
            margin-bottom: 10px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* ردیف اسلایدی افقی مخصوص موبایل و آیفون */
        .horizontal-slider {
            display: flex;
            gap: 15px;
            overflow-x: auto; /* فعال کردن اسکرول افقی */
            padding-bottom: 10px;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch; /* اسکرول نرم در آیفون */
        }

        /* حذف کردن نوار اسکرول زشت برای زیبایی */
        .horizontal-slider::-webkit-scrollbar {
            display: none;
        }

        /* کارت‌های داخل اسلایدر */
        .product-card {
            flex: 0 0 160px; /* عرض ثابت برای هر محصول در اسلاید */
            scroll-snap-align: start;
            background: #ffffff;
            border-radius: 15px;
            border: 1px solid #f0e6df;
            padding: 10px;
            text-align: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.02);
        }

        .product-card img {
            width: 100%;
            height: 140px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 8px;
        }

        .product-title {
            font-size: 0.9rem;
            margin: 5px 0;
            color: #444;
        }

        .product-price {
            font-size: 0.85rem;
            color: #d4af37;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="category-section">
        <div class="search-container">
            <input type="text" class="input-box" placeholder="🔍 جستجو در محصولات سما زرین..." style="width: 100%; box-sizing: border-box;">
        </div>
    </div>

    <div class="category-section">
        <div class="category-title">✨ ردیف اسلایدی دستبندها</div>
        <div class="horizontal-slider">
            
            <div class="product-card">
                <img src="img/bracelets/b1.jpg" alt="دستبند کارتیر">
                <h4 class="product-title">دستبند کارتیر مدرن</h4>
                <div class="product-price">۱۴,۵۰۰,۰۰۰ تومان</div>
            </div>

            <div class="product-card">
                <img src="img/bracelets/b2.jpg" alt="دستbند مینیمال">
                <h4 class="product-title">دستبند برلیان مینیمال</h4>
                <div class="product-price">۹,۲۰۰,۰۰۰ تومان</div>
            </div>

            <div class="product-card">
                <img src="img/bracelets/b3.jpg" alt="دستبند زنجیری">
                <h4 class="product-title">دستبند زنجیری البرز</h4>
                <div class="product-price">۱۱,۸۰۰,۰۰۰ تومان</div>
            </div>

            <div class="product-card">
                <img src="img/bracelets/b4.jpg" alt="دستبند لوتوس">
                <h4 class="product-title">دستبند طرح لوتوس</h4>
                <div class="product-price">۱۸,۶۰۰,۰۰۰ تومان</div>
            </div>

        </div>
    </div>

</body>
</html>
