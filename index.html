<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>گالری طلا و جواهر سما زرین</title>
    <style>
        /* 🎨 ۱. بک‌گراند بسیار روشن همراه با وکتورهای طلایی محو */
        body {
            background-color: #faf8f5; 
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 80 80"><path d="M40 10 C48 25, 60 25, 60 40 C60 55, 48 55, 40 70 C32 55, 20 55, 20 40 C20 25, 32 25, 40 10 Z" fill="none" stroke="%23d4af37" stroke-width="0.6" opacity="0.12"/></svg>');
            font-family: Arial, Tahoma, sans-serif;
            margin: 0;
            padding: 15px;
            color: #333;
        }

        .header {
            text-align: center;
            padding: 15px 0;
        }
        .header h1 {
            font-size: 1.6rem;
            color: #bc932b;
            margin: 0;
        }

        /* 🤍 ۲. سفید کردن کامل جاهای نوشتنی و کادرها */
        .search-box, .admin-panel input, .admin-panel select, .admin-panel button {
            background-color: #ffffff !important;
            border: 1px solid #e5d5c5;
            border-radius: 12px;
            padding: 12px;
            width: 100%;
            box-sizing: border-box;
            outline: none;
            font-size: 0.95rem;
            margin-bottom: 15px;
            box-shadow: 0 4px 12px rgba(212, 175, 55, 0.04);
        }

        .admin-panel button {
            background-color: #bc932b !important;
            color: white !important;
            font-weight: bold;
            cursor: pointer;
            border: none;
        }

        /* 📦 ۳. استایل دسته‌بندی و ردیف‌های اسلایدی دینامیک */
        .category-section {
            margin-bottom: 30px;
            display: none; /* در ابتدا مخفی است و اگر محصولی باشد ظاهر می‌شود */
        }

        .category-title {
            font-size: 1.1rem;
            color: #b8860b;
            margin-bottom: 12px;
            font-weight: bold;
        }

        .horizontal-slider {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding: 5px 5px 15px 5px;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
        }

        .horizontal-slider::-webkit-scrollbar {
            display: none;
        }

        .product-card {
            flex: 0 0 160px;
            scroll-snap-align: start;
            background-color: #ffffff;
            border-radius: 18px;
            border: 1px solid #f2e9e1;
            padding: 12px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.02);
            position: relative;
        }

        .product-card img {
            width: 100%;
            height: 140px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 10px;
        }

        .product-title {
            font-size: 0.88rem;
            margin: 5px 0;
            color: #444;
        }

        .product-price {
            font-size: 0.85rem;
            color: #d4af37;
            font-weight: bold;
        }

        /* دکمه حذف محصول برای ادمین */
        .delete-btn {
            position: absolute;
            top: 5px;
            left: 5px;
            background: #ff4d4d;
            color: white;
            border: none;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            cursor: pointer;
            font-size: 0.75rem;
            line-height: 20px;
        }

        /* خط جداکننده پنل مدیریت */
        .divider {
            border-top: 2px dashed #e5d5c5;
            margin: 40px 0;
        }

        .admin-title {
            color: #bc932b;
            text-align: center;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>گالری سما زرین</h1>
    </div>

    <input type="text" class="search-box" placeholder="🔍 جستجو در مدل‌های سما زرین...">

    <div class="category-section" id="sec-bracelets">
        <div class="category-title">✨ دستبندها</div>
        <div class="horizontal-slider" id="slider-bracelets"></div>
    </div>

    <div class="category-section" id="sec-rings">
        <div class="category-title">✨ انگشترها</div>
        <div class="horizontal-slider" id="slider-rings"></div>
    </div>

    <div class="category-section" id="sec-necklaces">
        <div class="category-title">✨ گردنبندها</div>
        <div class="horizontal-slider" id="slider-necklaces"></div>
    </div>

    <div class="category-section" id="sec-earrings">
        <div class="category-title">✨ گوشواره‌ها</div>
        <div class="horizontal-slider" id="slider-earrings"></div>
    </div>


    <div class="divider"></div>


    <div class="admin-panel">
        <h3 class="admin-title">🛠️ پنل مدیریت مدیریت سما زرین</h3>
        
        <input type="text" id="prod-title" placeholder="نام محصول (مثلا: گوشواره لوتوس)">
        <input type="text" id="prod-price" placeholder="قیمت (مثلا: ۸,۵۰۰,۰۰۰ تومان)">
        <input type="text" id="prod-img" placeholder="آدرس یا اسم عکس (مثلا: img/earrings/e1.jpg)">
        
        <select id="prod-category">
            <option value="bracelets">دستبندها</option>
            <option value="rings">انگشترها</option>
            <option value="necklaces">گردنبندها</option>
            <option value="earrings">گوشواره‌ها</option>
        </select>
        
        <button onclick="addProduct()">➕ افزودن به ویترین اسلایدی</button>
    </div>

    <script>
        // خواندن محصولات ذخیره شده قبلی
        let products = JSON.parse(localStorage.getItem('gallery_products')) || [];

        // نمایش دادن محصولات در دسته‌بندی خودشان
        function renderProducts() {
            // خالی کردن اسلایدرها قبل از رندر جدید
            const categories = ['bracelets', 'rings', 'necklaces', 'earrings'];
            categories.forEach(cat => {
                document.getElementById(`slider-${cat}`).innerHTML = '';
                document.getElementById(`sec-${cat}`).style.display = 'none';
            });

            // پخش کردن هر محصول در پوشه/اسلایدر خودش
            products.forEach((prod, index) => {
                const slider = document.getElementById(`slider-${prod.category}`);
                const section = document.getElementById(`sec-${prod.category}`);
                
                if (slider && section) {
                    section.style.display = 'block'; // ردیف را روشن کن
                    
                    const card = `
                        <div class="product-card">
                            <button class="delete-btn" onclick="deleteProduct(${index})">×</button>
                            <img src="${prod.img}" alt="${prod.title}">
                            <div class="product-title">${prod.title}</div>
                            <div class="product-price">${prod.price}</div>
                        </div>
                    `;
                    slider.innerHTML += card;
                }
            });
        }

        // عملکرد دکمه افزودن محصول جدید
        function addProduct() {
            const title = document.getElementById('prod-title').value;
            const price = document.getElementById('prod-price').value;
            const img = document.getElementById('prod-img').value;
            const category = document.getElementById('prod-category').value;

            if(!title || !price || !img) {
                alert('لطفا تمام کادرها را پر کنید!');
                return;
            }

            // اضافه کردن به آرایه
            products.push({ title, price, img, category });
            // ذخیره در حافظه مرورگر
            localStorage.setItem('gallery_products', JSON.stringify(products));
            
            // فرم را خالی کن
            document.getElementById('prod-title').value = '';
            document.getElementById('prod-price').value = '';
            document.getElementById('prod-img').value = '';
            
            // بروزرسانی ویترین
            renderProducts();
        }

        // حذف محصول
        function deleteProduct(index) {
            products.splice(index, 1);
            localStorage.setItem('gallery_products', JSON.stringify(products));
            renderProducts();
        }

        // اجرای اولیه هنگام باز شدن صفحه
        renderProducts();
    </script>
</body>
</html>
