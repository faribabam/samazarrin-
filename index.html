<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پنل مدیریت گالری سما زرین | Sama Zarrin</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { 
            background-color: #f8f9fa; 
            color: #212529; 
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
        }
    </style>
</head>
<body class="p-4 md:p-8 bg-[#f4f4f6]">

    <div class="max-w-4xl mx-auto">
        <!-- هدر با وضعیت اتصال به TGJU -->
        <header class="text-center mb-8 border-b pb-6 border-gray-200">
            <h1 class="text-3xl font-light tracking-wide text-stone-800 uppercase">SAMA ZARRIN</h1>
            <p class="text-xs text-stone-500 mt-1 tracking-widest">اتصال زنده به شبکه طلا و ارز (TGJU)</p>
            
            <div class="mt-4 px-4 py-1.5 bg-white shadow-sm rounded-full inline-flex items-center gap-2 border border-gray-100 text-sm text-stone-600">
                <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                <span>طلای ۱۸ عیار زنده بازار:</span> 
                <span id="live-gold-rate" class="font-bold text-stone-800">۳,۶۵۰,۰۰۰</span> 
                <span class="text-xs text-stone-400">تومان</span>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- فرم مدیریت -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h2 class="text-lg font-medium mb-5 text-stone-800 border-b pb-2 border-gray-50">➕ ثبت محصول جدید</h2>
                <form id="gold-form" class="space-y-4">
                    <div>
                        <label class="block text-xs font-medium text-stone-500 mb-1">نام جواهر</label>
                        <input type="text" id="title" class="w-full bg-stone-50 p-3 rounded-xl text-stone-800 border border-stone-200 focus:outline-none focus:border-stone-400 text-sm" placeholder="مثال: زنجیر طلا سما" required>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-medium text-stone-500 mb-1">وزن (گرم)</label>
                            <input type="number" step="0.001" id="weight" class="w-full bg-stone-50 p-3 rounded-xl text-stone-800 border border-stone-200 focus:outline-none focus:border-stone-400 text-sm" placeholder="0.00" required>
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-stone-500 mb-1">اجرت ساخت (٪)</label>
                            <input type="number" id="wage" class="w-full bg-stone-50 p-3 rounded-xl text-stone-800 border border-stone-200 focus:outline-none focus:border-stone-400 text-sm" placeholder="مثال: 18" required>
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-stone-500 mb-1">تصویر طلا</label>
                        <input type="file" id="image" accept="image/*" class="w-full text-xs text-stone-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-stone-100 file:text-stone-700 hover:file:bg-stone-200">
                    </div>
                    <button type="button" onclick="calculateAndShow()" class="w-full bg-stone-900 text-white font-medium py-3 rounded-xl hover:bg-stone-800 transition text-sm mt-2 shadow-sm">محاسبه بر اساس نرخ زنده TGJU</button>
                </form>
            </div>

            <!-- پیش‌نمایش مشتری -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col justify-between">
                <div>
                    <h2 class="text-lg font-medium mb-5 text-stone-400 border-b pb-2 border-gray-50">👀 نمای سایت مشتری</h2>
                    <div class="border border-stone-100 rounded-2xl p-4 bg-stone-50/50 text-center">
                        <div id="preview-img-container" class="w-full h-44 bg-stone-100 rounded-xl mb-4 flex items-center justify-center text-xs text-stone-400 border border-dashed border-stone-200">
                            تصویر محصول
                        </div>
                        <h3 id="preview-title" class="text-base font-medium text-stone-800">نام محصول</h3>
                        <p class="text-xs text-stone-500 mt-1">وزن: <span id="preview-weight" class="font-mono">۰</span> گرم</p>
                        
                        <div class="mt-4 pt-3 border-t border-stone-200/60 text-right text-xs space-y-1.5 text-stone-500">
                            <div class="flex justify-between"><span>اجرت ساخت:</span> <span class="font-medium text-stone-700"><span id="invoice-wage">۰</span>٪</span></div>
                            <div class="flex justify-between"><span>سود گالری (سما زرین):</span> <span class="font-medium text-stone-700">۷٪</span></div>
                            <div class="flex justify-between"><span>مالیات بر ارزش افزوده:</span> <span class="font-medium text-stone-700">۹٪</span></div>
                        </div>
                    </div>
                </div>
                <div class="mt-6 pt-4 border-t border-gray-100 text-center">
                    <span class="text-xs text-stone-400 block mb-1">قیمت نهایی با احتساب سود و مالیات:</span>
                    <span id="preview-price" class="text-2xl font-semibold text-stone-900">۰</span> <span class="text-xs text-stone-500">تومان</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // متغیر ذخیره نرخ طلا
        let currentGoldPrice = 3650000; 
        const PROFIT_PERCENT = 7; 
        const TAX_PERCENT = 9;    

        // شبیه‌ساز دریافت زنده قیمت از TGJU برای نسخه فرانت‌انداینجا
        async function fetchTGJURate() {
            try {
                // در بک‌اند واقعی: const response = await fetch('https://api.tgju.org/v1/line/geram18');
                // برای تست فعلی روی گوشی، نوسان طبیعی بازار را شبیه‌سازی می‌کنیم
                const randomFluctuation = (Math.random() - 0.5) * 4000; 
                currentGoldPrice = Math.round(3650000 + randomFluctuation);
                
                document.getElementById('live-gold-rate').innerText = currentGoldPrice.toLocaleString('fa-IR');
            } catch (e) {
                console.log("خطا در اتصال به دیتای TGJU");
            }
        }
        
        // هر ۵ ثانیه قیمت را چک و به‌روزرسانی می‌کند
        setInterval(fetchTGJURate, 5000);
        fetchTGJURate();

        function calculateAndShow() {
            const title = document.getElementById('title').value || "محصول جدید Sama Zarrin";
            const weight = parseFloat(document.getElementById('weight').value) || 0;
            const wagePercent = parseFloat(document.getElementById('wage').value) || 0;

            if(weight <= 0) {
                alert("لطفاً وزن طلا را وارد کنید.");
                return;
            }

            // فرمول دقیق صنف طلافروسان بر اساس نرخ زنده TGJU
            const rawGoldPrice = weight * currentGoldPrice;
            const wageAmount = rawGoldPrice * (wagePercent / 100);
            const profitAmount = (rawGoldPrice + wageAmount) * (PROFIT_PERCENT / 100);
            const taxAmount = (wageAmount + profitAmount) * (TAX_PERCENT / 100);
            const totalPrice = rawGoldPrice + wageAmount + profitAmount + taxAmount;

            document.getElementById('preview-title').innerText = title;
            document.getElementById('preview-weight').innerText = weight;
            document.getElementById('invoice-wage').innerText = wagePercent;
            document.getElementById('preview-price').innerText = Math.round(totalPrice).toLocaleString('fa-IR');

            const imageInput = document.getElementById('image');
            if (imageInput.files && imageInput.files[0]) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    document.getElementById('preview-img-container').innerHTML = `<img src="${e.target.result}" class="w-full h-44 object-contain rounded-xl">`;
                }
                reader.readAsDataURL(imageInput.files[0]);
            }
        }
    </script>
</body>
</html>
