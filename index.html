<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>گالری طلا و جواهر سما زرین | SAMA ZARRIN</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background-color: #fcfbf9; font-family: system-ui, -apple-system, sans-serif; }
    </style>
</head>
<body id="main-body" class="p-4 md:p-8 flex items-center justify-center min-h-screen">

    <!-- 🔐 بخش فرم ورود مشتری -->
    <div id="auth-box" class="w-full max-w-sm bg-white p-8 rounded-3xl shadow-sm border border-stone-100">
        <h1 class="text-center text-2xl font-light tracking-widest text-stone-800 mb-2 uppercase">SAMA ZARRIN</h1>
        <p class="text-center text-xs text-stone-400 mb-6">گالری طلا و جواهرات مینیمال</p>
        
        <form onsubmit="saveUser(event)" class="space-y-4">
            <div>
                <label class="text-xs text-stone-500 mr-1">نام و نام‌خانوادگی</label>
                <input type="text" id="name" required class="w-full p-3.5 mt-1 rounded-xl bg-stone-50 border border-stone-200 text-sm">
            </div>
            <div>
                <label class="text-xs text-stone-500 mr-1">شماره همراه</label>
                <input type="tel" id="phone" required class="w-full p-3.5 mt-1 rounded-xl bg-stone-50 border border-stone-200 text-sm text-center font-mono" placeholder="09xxxxxxxxx">
            </div>
            <button type="submit" id="submit-btn" class="w-full bg-stone-900 text-white py-3.5 rounded-xl text-sm font-medium mt-2 hover:bg-stone-800 transition-all cursor-pointer">ورود به گالری</button>
        </form>
    </div>

    <!-- 🛍️ پنل اصلی سایت (ویترین طلا) -->
    <div id="main-panel" class="w-full max-w-5xl mx-auto hidden">
        <!-- هدر لوکس سایت -->
        <header class="flex flex-col sm:flex-row justify-between items-center pb-6 border-b border-stone-200/60 mb-8 gap-4">
            <div class="text-right">
                <h1 class="text-3xl font-light tracking-widest text-stone-900 uppercase">SAMA ZARRIN</h1>
                <p id="user-welcome" class="text-xs text-stone-500 mt-1"></p>
            </div>
            
            <!-- ماشین حساب/تنظیم نرخ طلا توسط شما -->
            <div class="bg-amber-50/60 border border-amber-200/50 rounded-2xl p-3.5 flex items-center gap-3">
                <div class="text-right">
                    <label class="block text-[10px] font-bold text-amber-800 mb-1">نرخ امروز ۱ گرم طلای ۱۸ عیار (تومان):</label>
                    <input type="number" id="gold-rate-input" oninput="updateAllPrices()" value="4500000" class="bg-white px-3 py-1.5 rounded-xl border border-amber-200 text-sm font-mono text-center text-amber-900 w-36 focus:outline-none focus:ring-1 focus:ring-amber-400">
                </div>
            </div>
        </header>

        <!-- بخش ویترین محصولات -->
        <h2 class="text-lg font-light text-stone-800 mb-6 flex items-center gap-2">
            <span class="w-2 h-2 rounded-full bg-amber-500"></span> ✨ جدیدترین مجموعه‌های مینیمال سما زرین
        </h2>
        
        <div id="products-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
            <!-- محصولات توسط جاوااسکریپت اینجا رندر می‌شوند -->
        </div>
    </div>

    <script>
        // تنظیمات ربات تلگرام و آیدی مدیریتی شما
        const BOT_TOKEN = "8940936882:AAG2OeXFfOsOwMPEuwhRHxfef9iBK68q3IU";
        const ADMIN_CHAT_ID = "6850239276"; 
        const MY_TELEGRAM_ID = "sama_zarinn"; // آیدی جدید شما برای سفارش‌ها

        // دیتابیس محصولات نمونه
        const products = [
            { id: 1, name: "دستبند زنجیری مینیمال باران", weight: 2.45, wagePercent: 12, profitPercent: 9, img: "https://images.unsplash.com/photo-1611591437281-460bfbe1220a?w=500&auto=format&fit=crop&q=60" },
            { id: 2, name: "انگشتر گره طلا ۱۸ عیار", weight: 1.82, wagePercent: 15, profitPercent: 9, img: "https://images.unsplash.com/photo-1605100804763-247f67b3557e?w=500&auto=format&fit=crop&q=60" },
            { id: 3, name: "گردنبند پلاک سکه‌ای مدرن", weight: 4.10, wagePercent: 10, profitPercent: 9, img: "https://images.unsplash.com/photo-1599643478518-a784e5dc4c8f?w=500&auto=format&fit=crop&q=60" }
        ];

        function calculateGoldPrice(weight, wagePercent, profitPercent, currentRate) {
            const basePrice = weight * currentRate;
            const wageAmount = basePrice * (wagePercent / 100);
            const subTotal = basePrice + wageAmount;
            const profitAmount = subTotal * (profitPercent / 100);
            return Math.round(subTotal + profitAmount);
        }

        function formatPrice(price) {
            return price.toLocaleString('fa-IR') + " تومان";
        }

        function updateAllPrices() {
            const currentRate = parseFloat(document.getElementById('gold-rate-input').value) || 0;
            const grid = document.getElementById('products-grid');
            grid.innerHTML = "";

            products.forEach(p => {
                const finalPrice = calculateGoldPrice(p.weight, p.wagePercent, p.profitPercent, currentRate);
                
                const card = `
                    <div class="bg-white rounded-3xl overflow-hidden shadow-sm border border-stone-100 hover:shadow-md transition-all group">
                        <div class="h-64 bg-stone-100 relative overflow-hidden">
                            <img src="${p.img}" alt="${p.name}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
                            <span class="absolute top-3 right-3 bg-white/90 backdrop-blur-sm px-3 py-1 rounded-full text-[11px] font-mono text-stone-700">
                                ${p.weight.toFixed(2)} گرم
                            </span>
                        </div>
                        <div class="p-5 text-right space-y-3">
                            <h3 class="text-sm font-medium text-stone-800">${p.name}</h3>
                            <div class="flex justify-between items-center bg-stone-50 p-2.5 rounded-xl">
                                <span class="text-xs text-stone-400">قیمت نهایی روز:</span>
                                <span class="text-sm font-bold text-amber-600 font-mono">${formatPrice(finalPrice)}</span>
                            </div>
                            <!-- لینک آپدیت شده به آیدی جدید تلگرام شما -->
                            <a href="https://t.me/${MY_TELEGRAM_ID}?text=${encodeURIComponent('سلام، قصد سفارش محصول «' + p.name + '» را دارم.')}" target="_blank" class="block text-center w-full bg-stone-900 text-white py-2.5 rounded-xl text-xs font-medium hover:bg-amber-600 transition-colors">
                                🛍️ مشاوره و خرید مستقیم در تلگرام
                            </a>
                        </div>
                    </div>
                `;
                grid.insertAdjacentHTML('beforeend', card);
            });
        }

        async function saveUser(e) {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;

            btn.innerText = "در حال اتصال...";
            btn.disabled = true;

            const msg = `🔔 مشتری جدید وارد سایت شد:
👤 نام: ${name}
📱 شماره: ${phone}
🆔 لطفا جهت احراز هویت با او تماس بگیرید.`;

            try {
                const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${ADMIN_CHAT_ID}&text=${encodeURIComponent(msg)}`;
                const img = new Image();
                img.src = url;

                localStorage.setItem('sama_user', JSON.stringify({ name, phone }));
                checkLoginState();
            } catch (err) {
                alert("خطایی رخ داد.");
                btn.disabled = false;
                btn.innerText = "ورود به گالری";
            }
        }

        function checkLoginState() {
            const session = localStorage.getItem('sama_user');
            if (session) {
                const user = JSON.parse(session);
                document.getElementById('main-body').className = "p-4 md:p-8 block bg-[#fcfbf9]";
                document.getElementById('auth-box').classList.add('hidden');
                document.getElementById('main-panel').classList.remove('hidden');
                document.getElementById('user-welcome').innerText = `✨ خوش آمدید، ${user.name} عزیز`;
                updateAllPrices();
            }
        }

        checkLoginState();
    </script>
</body>
</html>
