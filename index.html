<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قالب کاملاً روشن</title>
    <style>
        /* تنظیمات اصلی برای تم روشن */
        :root {
            --bg-color: #f8f9fa;       /* پس‌زمینه اصلی روشن */
            --card-bg: #ffffff;        /* پس‌زمینه کارت‌ها سفید */
            --text-main: #212529;      /* رنگ متن اصلی تیره */
            --text-muted: #6c757d;     /* رنگ متن کم‌رنگ‌تر */
            --primary-color: #0d6efd;  /* رنگ دکمه‌ها و المان‌های شاخص */
            --border-color: #dee2e6;   /* رنگ خطوط و مرزها */
        }

        body {
            font-family: Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* استایل کارت کاربردی */
        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 24px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        h1 {
            font-size: 24px;
            margin-top: 0;
            color: var(--text-main);
        }

        p {
            color: var(--text-muted);
            line-height: 1.6;
        }

        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            transition: background-color 0.2s;
        }

        .btn:hover {
            background-color: #0b5ed7;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>تم کاملاً روشن</h1>
        <p>این یک نمونه صفحه با استایل کلاً روشن است. تضاد رنگی (Contrast) متن و پس‌زمینه به گونه‌ای تنظیم شده که در محیط‌های پرنور چشم را اذیت نکند و خوانایی بالایی داشته باشد.</p>
        <button class="btn">تایید و ادامه</button>
    </div>

</body>
</html>
