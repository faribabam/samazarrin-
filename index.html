<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پشتیبان هوشمند سما زرین</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: #0b0b0c;
            color: #f1f1f1;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* دکمه شناور چت در گوشه سایت */
        .chat-toggle-btn {
            position: fixed;
            bottom: 25px;
            right: 25px;
            width: 60px;
            height: 60px;
            background-color: #d4af37;
            border-radius: 50%;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
            border: 2px solid #1c1a14;
            cursor: pointer;
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 26px;
            transition: all 0.3s ease;
        }

        .chat-toggle-btn:hover {
            transform: scale(1.1) rotate(5deg);
            background-color: #f3c623;
        }

        /* کانتینر چت به صورت ویجت شناور */
        .chat-container {
            position: fixed;
            bottom: 100px;
            right: 25px;
            width: 380px;
            height: 60vh;
            max-height: 580px;
            display: none; /* ابتدا مخفی است و با کلیک روی دکمه باز می‌شود */
            flex-direction: column;
            background-color: #131316;
            border-radius: 20px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
            border: 1px solid #2a2415;
            z-index: 10000;
            overflow: hidden;
            transition: all 0.2s ease-in-out;
        }

        /* بهینه‌سازی نمایش در گوشی‌های موبایل */
        @media (max-width: 480px) {
            .chat-container {
                width: calc(100% - 40px);
                height: 70vh;
                right: 20px;
                bottom: 95px;
            }
        }

        .chat-header {
            padding: 18px;
            background: linear-gradient(135deg, #1c1a14 0%, #0f0e0b 100%);
            border-bottom: 1px solid #d4af37;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .avatar {
            width: 44px;
            height: 44px;
            background-color: #d4af37;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #000;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
        }

        .status-info h2 {
            font-size: 16px;
            color: #d4af37;
            margin-bottom: 2px;
        }

        .status-info p {
            font-size: 11px;
            color: #a6a6a6;
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background-image: radial-gradient(#1c1b18 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* استایل سفارشی اسکرول‌بار */
        .chat-messages::-webkit-scrollbar {
            width: 5px;
        }
        .chat-messages::-webkit-scrollbar-track {
            background: #131316;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: #2a2415;
            border-radius: 10px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 14px;
            font-size: 14px;
            line-height: 1.6;
            word-wrap: break-word;
        }

        /* تنظیم چت شما در سمت راست صفحه */
        .message.user {
            background-color: #2a2415;
            color: #f5edd5;
            border: 1px solid #4a3f25;
            align-self: flex-start;
            border-bottom-right-radius: 4px;
        }

        /* تنظیم چت هوش مصنوعی در سمت چپ صفحه */
        .message.ai {
            background-color: #1c1c21;
            color: #e1e1e6;
            border: 1px solid #292930;
            align-self: flex-end;
            border-bottom-left-radius: 4px;
        }

        /* انیمیشن در حال تایپ */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 4px 8px;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background-color: #a6a6a6;
            border-radius: 50%;
            animation: blink 1.4s infinite both;
        }

        .typing-indicator span:nth-child(2) { animation-delay: .2s; }
        .typing-indicator span:nth-child(3) { animation-delay: .4s; }

        @keyframes blink {
            0% { opacity: .2; }
            20% { opacity: 1; }
            100% { opacity: .2; }
        }

        .chat-input-area {
            padding: 16px;
            background-color: #0f0e0b;
            border-top: 1px solid #2a2415;
            display: flex;
            gap: 12px;
        }

        .chat-input-area input {
            flex: 1;
            background-color: #171613;
            border: 1px solid #3a3321;
            padding: 14px;
            border-radius: 10px;
            color: #ffffff;
            font-size: 14px;
            outline: none;
        }

        .chat-input-area input:focus {
            border-color: #d4af37;
        }

        .chat-input-area button {
            background-color: #d4af37;
            color: #000000;
            border: none;
            padding: 0 22px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .chat-input-area button:hover {
            background-color: #f3c623;
        }
    </style>
</head>
<body>

    <button class="chat-toggle-btn" id="chatToggleBtn">💬</button>

    <div class="chat-container" id="chatWidget">
        <div class="chat-header">
            <div class="avatar">SZ</div>
            <div class="status-info">
                <h2>مشاور هوشمند سما زرین</h2>
                <p>پاسخگوی خودکار و آنلاین گالری</p>
            </div>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="message ai">سلام به گالری طلا و جواهرات سما زرین خوش آمدید. ✨ چطور می‌تونم کمکتون کنم؟ (می‌تونید درباره سفارش ساخت، قیمت‌ها یا انواع جواهرات بپرسید)</div>
        </div>

        <div class="chat-input-area">
            <input type="text" id="userInput" placeholder="سوال خود را مطرح کنید..." autocomplete="off">
            <button id="sendBtn">ارسال</button>
        </div>
    </div>

    <script>
        // دکمه‌ها و کانتینر چت
        const chatToggleBtn = document.getElementById('chatToggleBtn');
        const chatWidget = document.getElementById('chatWidget');
        const chatMessages = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        // مدیریت وضعیت باز یا بسته بودن ویجت
        chatToggleBtn.addEventListener('click', () => {
            if (chatWidget.style.display === 'none' || chatWidget.style.display === '') {
                chatWidget.style.display = 'flex';
            } else {
                chatWidget.style.display = 'none';
            }
        });

        // وضعیت ورود حالت مدیریت
        let isAdminMode = false;

        // دیتابیس کلمات کلیدی برای خروجی هوشمند مشتریان
        const aiKnowledge = [
            {
                keywords: ['سلام', 'درود', 'صبح بخیر', 'عصر بخیر'],
                response: "سلام و درود بر شما! به گالری سما زرین خوش آمدید. امروز چطور می‌تونم در انتخاب یک اثر درخشان کمکتون کنم؟ 💎"
            },
            {
                keywords: ['سفارش', 'ساخت', 'طراحی', 'سفارشی', 'ساخت طلا'],
                response: "ما در سما زرین انواع طرح‌های مدنظر شما (اسم، دستبند، انگشتر و طرح‌های خاص) را با بالاترین دقت طراحی و تولید می‌کنیم. کافیه عکس یا ایده‌تون رو برامون بفرستید تا براتون قالب‌سازی و ساخته بشه. ✨ پیشنهاد می‌کنم یک پلاک اسم اختصاصی یا دستبند کارتیر با وزن دلخواهتون انتخاب کنید."
            },
            {
                keywords: ['قیمت', 'نرخ', 'مظنه', 'چنده'],
                response: "قیمت نهایی جواهرات ما بر اساس نرخ روز طلا، وزن دقیق محصول، سنگ‌های به کار رفته و اجرت ساخت محاسبه میشه. اگر حدود بودجه‌تون رو بفرمایید، می‌تونم شیک‌ترین کارهای سبک‌وزن یا نیم‌ست‌های کادویی لوکس رو بهتون پیشنهاد بدم."
            },
            {
                keywords: ['خرید', 'سفارش دادن', 'چطور بخرم'],
                response: "برای ثبت سفارش یا خرید محصولات گالری سما زرین، می‌تونید مدل مورد نظرتون رو انتخاب کنید تا فاکتور رسمی و جزییات ساخت یا ارسال براتون هماهنگ بشه. اگر برای مناسبت خاصی خرید می‌کنید، بگید تا بهترین گزینه رو برای خرید پیشنهاد کنم! 🛍️"
            },
            {
                keywords: ['آدرس', 'کجاست', 'حضوری'],
                response: "گالری سما زرین به صورت آنلاین و حضوری در خدمت شماست. برای هماهنگی مراجعه حضوری یا دریافت آدرس دقیق کارگاه و دفتر مرکزی، لطفاً با پشتیبانی ما در ارتباط باشید."
            },
            {
                keywords: ['انگشتر', 'دستبند', 'گردنبند', 'گوشواره'],
                response: "تمامی کارهای ما از طلای ۱۸ عیار استاندارد و مرغوب‌ترین سنگ‌های قیمتی و برلیان ساخته میشن. پیشنهاد ما برای یک خرید ماندگار، انگشترهای تک‌نگین کلاسیک یا دستبندهای زنجیری ظریف است که با هر بودجه‌ای قابل سفارشه."
            }
        ];

        function appendMessage(text, sender) {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message', sender);
            messageDiv.innerText = text;
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            return messageDiv;
        }

        // افزودن لودینگ در حال تایپ
        function showTypingIndicator() {
            const indicatorDiv = document.createElement('div');
            indicatorDiv.classList.add('message', 'ai', 'typing-container');
            indicatorDiv.innerHTML = `<div class="typing-indicator"><span></span><span></span><span></span></div>`;
            chatMessages.appendChild(indicatorDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            return indicatorDiv;
        }

        // پردازش متن کاربر و پیدا کردن بهترین پاسخ
        function generateAiResponse(userText) {
            const cleanText = userText.trim();
            
            // بررسی فعال‌سازی حالت ادمین با رمز اختصاصی شما
            if (cleanText === '211820sk') {
                isAdminMode = true;
                return "🔓 ادمین گرامی سما زرین، هویت شما تایید شد. سیستم در حالت ویرایش ادمین قرار گرفت. لطفاً سناریوها، متن‌ها یا برنامه‌های کاری خود را جهت اصلاح و پردازش وارد کنید.";
            }

            // رفتار هوش مصنوعی در حالت ادمین
            if (isAdminMode) {
                return `🛠️ [حالت مدیریت فعال]: متن شما با موفقیت دریافت و در حافظه موقت پردازش شد: "${cleanText}". شما می‌توانید بخش‌های مختلف سناریو را ویرایش کنید یا با رفرش صفحه به حالت کاربر عادی برگردید.`;
            }

            // رفتار هوش مصنوعی برای کاربر عادی (پیشنهاد خرید)
            const cleanTextLower = cleanText.toLowerCase();
            for (const item of aiKnowledge) {
                for (const keyword of item.keywords) {
                    if (cleanTextLower.includes(keyword)) {
                        return item.response;
                    }
                }
            }
            
            // پاسخ پیش‌فرض هوشمند و ترغیب‌کننده برای کاربر عادی جهت خرید طلا
            return "ممنون از پیام شما در گالری سما زرین. ✨ اگر مایلید یک هدیه خاص یا یک طلای سرمایه‌گذاری شیک بخرید، لطفاً حدود بودجه یا نوع جواهری که دوست دارید (مثلاً دستبند، انگشتر یا گوشواره) رو بفرمایید تا جذاب‌ترین کارهای ۱۸ عیار گالری رو بهتون پیشنهاد بدم.";
        }

        async function handleSendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            // ۱. نمایش پیام کاربر در سمت راست
            appendMessage(text, 'user');
            userInput.value = '';

            // ۲. نمایش حالت در حال تایپ هوش مصنوعی در سمت چپ
            const typingIndicator = showTypingIndicator();

            // ۳. پاسخ هوشمند با کمی تاخیر برای طبیعی‌تر شدن چت
            setTimeout(() => {
                typingIndicator.remove(); // حذف انیمیشن تایپ
                const responseText = generateAiResponse(text);
                appendMessage(responseText, 'ai');
            }, 1200);
        }

        sendBtn.addEventListener('click', handleSendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                handleSendMessage();
            }
        });
    </script>
</body>
</html>
